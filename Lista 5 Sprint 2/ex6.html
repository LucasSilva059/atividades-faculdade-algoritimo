<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ex6</title>
</head>
<body>
   Nota: <input type="text" id="inp_nota"> <br><br>
   Frequência: <input type="text" id="inp_frequencia"><br><br>

   <button onclick="analisar()">Analisar Aluno</button><br>

   <div id="div_mensagem"></div>

</body>
<script>
   function analisar(){
      let nota = Number(inp_nota.value);
      let frequencia = Number(inp_frequencia.value);

      if(nota < 0 || nota > 10){
         alert (`Onde já se viu nota <0 ou >10?!`)
         div_mensagem.innerHTML = ``
      }
      else if(frequencia < 0 || frequencia > 100){
         alert (`Onde já se viu frequência <0 ou >100?!`)
         div_mensagem.innerHTML = ``   
      }
      else if(nota >= 0 && nota <=6){
         div_mensagem.innerHTML = `Aluno ficou abaixo da média`
      }
      else if(nota > 6 && nota <=8){
         div_mensagem.innerHTML = `Aluno ficou na média`
      }
      else if(nota > 9 && nota <=10){
         div_mensagem.innerHTML = `Aluno ficou acima da média`
      };

      if(frequencia >= 75){
         div_mensagem.innerHTML += `<br>Aluno aprovado por frequência`
      }
      else{
         div_mensagem.innerHTML += `<br>Aluno reprovado por frequência`
      };
   }  
</script>
</html>
