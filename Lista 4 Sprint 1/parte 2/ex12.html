<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ex12</title>
</head>
<body>
   Digite um número maior que zero: <input type="text" id="inp_n1">

   <button onclick="verificar()">Múltiplo de 5</button>

   <div id="div_mensagem"></div>

</body>
   <script>
      function verificar(){
         let n1 = Number(inp_n1.value);
         resto = n1 % 5;

         if (resto == 0){
            div_mensagem.innerHTML = `Perfeito, esse número é múltiplo de cinco`
         }
         else if (resto == 1){
            div_mensagem.innerHTML = `Vish, sobrou um`
         }
         else if (resto == 2){
            div_mensagem.innerHTML = `Para esse o resto é dois`
         }
         else if (resto == 3){
            div_mensagem.innerHTML = `Com mais dois daria certo`
         }
         else if (resto == 4){
            div_mensagem.innerHTML = `Só faltou 1 para ser múltiplo de 5`
         };
         
      }
   
   </script>

</html>
