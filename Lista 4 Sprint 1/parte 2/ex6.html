<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ex6</title>
</head>
<body>
   <select name="" id="sel_time">
      <option disabled selected>Selecione um time</option>
      <option>São Paulo</option>
      <option>Corinthians</option>
      <option>Palmeiras</option>
      <option>Santos</option>
   </select>

   <button onclick="faleSobre()">Fale sobre esse time</button>

   <div style="background-color: black; color: white;" id="div_mensagem"></div>

</body>
<script>
   function faleSobre(){
      let time = sel_time.value;

      if(time == 'Corinthians'){
         div_mensagem.innerHTML = `<spam style="background-color: black; color: white;"> Salve o Corinthians</spam>`
      }
      else if(time == 'Palmeiras'){
         div_mensagem.innerHTML = `<spam style="background-color: green; color: white;"> Salve o alviverde imponente </spam>`
      }
      else if (time == 'São Paulo'){
         div_mensagem.innerHTML = `<spam style="background-color: black; color: red;"> Salve o Tricolor paulista </spam>`
      
      }
      else{
         div_mensagem.innerHTML = `<spam style="background-color: white; color: black;"> Agora quem dá a bola é o Santos </spam>`
      }
   }
</script>
</html>
