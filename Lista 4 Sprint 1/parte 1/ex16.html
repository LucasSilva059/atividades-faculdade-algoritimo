<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ex16</title>
</head>
<body>
    Quantos homens estão no elevador?<input type="text" id="inp_qtdHomem"> <br>
    Quantas mulheres estão no elevador? <input type="text" id="inp_qtdMulher"> <br><br>

    <button onclick="but_ligar()">Ligar elevador</button>

    <div id="mensagem1" style="color: green;"></div>
    <div id="mensagem2" style="color: red;"></div>

    <script>
        function but_ligar(){
            let mulher = Number(inp_qtdMulher.value) * 70;
            let homem = Number(inp_qtdHomem.value) * 90;
            let soma = mulher + homem;

            if(soma <= 500) {
                mensagem1.innerHTML = `Elevador vai se mover, pois está com ${soma}kg`
            } else {
                let sobra = soma - 500

                mensagem2.innerHTML = `Precisa perder ${sobra}kg para mover o elevador`
            };



          
        };
    </script>
</body>
</html>
