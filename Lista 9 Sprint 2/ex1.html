<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ex1</title>
</head>
<body>
   <button onclick="sortear()">sortear</button>

   <div id="div_mensagem"></div>

</body>
</html>
<script>
   function sortear(){
      let aleatorio = Math.random()

      if(aleatorio >= 0.5){
         div_mensagem.innerHTML = `Eu arredondaria para 1`
      }
      else{
         div_mensagem.innerHTML = `Eu arredondaria para 0`
      }
   }
</script>
