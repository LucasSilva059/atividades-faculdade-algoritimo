<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ex4</title>
</head>
<body>
   <button onclick="sortear()">Sortear nota</button>

   <div id="div_mensagem"></div>

</body>
</html>
<script>
   function sortear(){
      let aleatorio = Math.random()
      let formatado = (aleatorio * 9 + 1).toFixed(1);

      div_mensagem.innerHTML = formatado;
   }
</script>
