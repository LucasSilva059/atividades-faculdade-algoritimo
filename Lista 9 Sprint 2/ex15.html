<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
</head>
<body>
   <div id="div_mensagem"></div><br>
   <button onclick="sortear()">Sortear numero de -30 a -9</button><br>
   <div id="div_mensagem2"></div>
</body>
</html>
<script>
   let n1 = 0;
   let n2 = 0

   function sortear(){
      let n = Math.random();
      let intervalo = 30 - 9;
      let formatado = (n * intervalo - 30).toFixed(0); 
      let numero = formatado;

      if(numero % 2 == 0){
         n2 ++
      }
      else{
         n1 ++
      }
      div_mensagem.innerHTML = `Números pares: ${n2}<br>  
                                 Números ímpares: ${n1}`;
      div_mensagem2.innerHTML = numero
   }
</script>
