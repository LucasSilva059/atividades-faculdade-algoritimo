<script>
   function retorna(numeros, valor){

      let quantidade = 0

      for(let i = 0; i < numeros.length; i++){
            if(numeros[i] == valor){
               quantidade ++
            }
      }
      return quantidade
   }
   console.log(retorna([6,10,7,6],6))
</script>
