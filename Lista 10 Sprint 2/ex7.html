<script>
   function retorna(numeros){

      soma = 0;

      for(let i = 0; i < numeros.length; i++){
            soma += numeros[i] 
      }
      let media = soma / numeros.length

      return media
   }
   console.log(retorna([8,10,7,6]))
</script>
