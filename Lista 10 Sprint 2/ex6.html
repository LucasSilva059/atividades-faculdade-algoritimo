<script>
   function retorna(numeros){

      numeros = [1,2,5,2]
      let maior = numeros[0];

      for(let i = 0; i < numeros.length; i++){

         if(numeros[i] < maior){
            maior = numeros[i];
         }

      }

      return maior;
   }

   console.log(retorna([1,2,5,2]));
</script>
