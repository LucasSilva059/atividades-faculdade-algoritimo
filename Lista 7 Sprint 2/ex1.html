<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="incremento()">incrementar</button>

    <div id="div_mensagem"></div>

</body>
</html>
<script>
    let n = 0
    function incremento(){
        
        while(n < 15){
            n = n + 1
            div_mensagem.innerHTML += `<br>${n}`
        } 
    }
</script>
