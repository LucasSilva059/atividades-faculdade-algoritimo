<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    numero: <input type="text" id="inp_numero">
    frase: <input type="text" id="inp_frase">

    <button onclick="papagaio()">Papagaio Repetitivo</button>

    <div id="div_mensagem"></div>

</body>
</html>
<script>
    function papagaio(){
        let numero = inp_numero.value;
        let frase = inp_frase.value;
        let fraseAcumulada = '';
        let mensagem = '';
        let contador = 0;

        while (contador < numero){
            contador ++
            fraseAcumulada += `${frase} `
            mensagem += `${contador}. ${fraseAcumulada}<br>`
        }
        div_mensagem.innerHTML = mensagem


    }
</script>
