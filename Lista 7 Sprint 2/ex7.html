<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="filtrar()">S2 Pares</button>

    <div id="div_mensagem"></div>
</body>
</html>
<script>
    contagem = 0

    function filtrar(){
        while (contagem >= 0 && contagem < 100 ){
            
            contagem = contagem + 1
            
            if((contagem % 2) == 0){
                
                div_mensagem.innerHTML += `<br> ${contagem}`
            }
        }
    }
</script>
