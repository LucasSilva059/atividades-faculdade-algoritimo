<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="diga()">Diga algo sobre a matéria de Algoritmos</button>
    
    <div id="div_mensagem"></div>
</body>
</html>

<script>
    let contagem = 0

    function diga(){
        
        while(contagem < 7){
            contagem = contagem + 1
            div_mensagem.innerHTML += `<br>Fernandinho é fera!`
        }
    }
</script>
