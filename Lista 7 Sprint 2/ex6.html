<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="filtrar()">Filtrar números Cabalísticos</button>

    <div id="div_mensagem"></div>
</body>
</html>
<script>
    contagem = 0

    function filtrar(){
        while (contagem < 30 ){
            
            contagem = contagem + 1
            
            if(contagem != 3 && contagem != 4 && contagem != 7 && contagem != 10 && contagem != 12){
                
                div_mensagem.innerHTML += `<br> ${contagem}`
            }
        }
    }
</script>
