<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ex4</title>
</head>
<body>
   Digite os seus filmes favoritos em ordem descrescente: <input type="text" id="inp_filme">

   <button onclick="cadastrar()">Cadastrar Filme</button><br>

   <button onclick="verFav()">Ver Favoritos</button>

   <div id="div_mensagem"></div>
</body>
</html>
<script>
   let listaFilme = []

   function cadastrar(){
      let filme = inp_filme.value

      listaFilme.push(filme)
   }

   function verFav(){
      let tamanho = listaFilme.length

      div_mensagem.innerHTML = `
      <br><br>${listaFilme}<br><br>

      Total de filmes: ${tamanho}<br><br>
      
      O filme que mais gosta é: ${listaFilme[0]}<br>
      O filme que menos gosta é: ${listaFilme[tamanho - 1]}
      `
   }
</script>
