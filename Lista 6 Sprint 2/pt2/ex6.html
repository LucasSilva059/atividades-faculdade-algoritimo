<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ex4</title>
</head>
<body>
   Digite os seus filmes favoritos em ordem descrescente: <input type="text" id="inp_filme">

   <button onclick="cadastrar()">Cadastrar Filme</button>

   <div id="div_mensagem"></div>
</body>
</html>
<script>
   let listaFilme = []

   function cadastrar(){
      let filme = inp_filme.value;
      listaFilme.push(filme);

      let listaFormatada = listaFilme.toString().replaceAll(",","<br>");

      div_mensagem.innerHTML = `${listaFormatada}`
   }

</script>
