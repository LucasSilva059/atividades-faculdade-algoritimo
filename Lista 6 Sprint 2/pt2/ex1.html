<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>ex1</title>
</head>
<body>
   <input type="text" placeholder="Digite o nome de uma fruta" id="inp_nomeFruta">

   <button onclick="pesquisar()">Pesquisar</button>

   <div id="div_mensagem"></div>

</body>
</html>
<script>
   let lista = ['uva','banana','morango'];
   
   function pesquisar(){
      let fruta = inp_nomeFruta.value ;

      if(lista.includes(fruta)){
      div_mensagem.innerHTML = `A fruta "${fruta}" existe na lista.`
      }
      else{
      div_mensagem.innerHTML = `Não existe a fruta "${fruta}" na lista`
      };
   };
</script>
